# Data-driven equivalent of journey_product_detail() in journeys.py.
#
# Scenarios are the HOW: site-specific steps that drive the browser to provoke
# events. Each `expect` names an event only — its required params and severity
# come from the loaded spec (specs/ga4_standard.yaml), never from here. That is
# what lets the same scenario run against the generic standard OR a client's
# GTM-derived spec with zero changes.

product_detail:
  steps:
    - goto: "/shop"
    - accept_consent: true
    - click: { selector_ref: product_card, on_fail: [view_item] }
    - expect: view_item
    - click: { selector_ref: add_to_cart, on_fail: [add_to_cart] }
    - expect: add_to_cart
